services:
  postgres:
    image: postgres:15-alpine
    container_name: fishflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fishflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fishflow-network

  redis:
    image: redis:7-alpine
    container_name: fishflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fishflow-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fishflow-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./tenants:/app/tenants
    networks:
      - fishflow-network

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: fishflow-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app
      - ./apps/api/src:/app/src/api_src:ro
      - ./tenants:/app/tenants
    networks:
      - fishflow-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fishflow-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - fishflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  fishflow-network:
    driver: bridge
